# Streamlit theme — matches the in-app three-color system.
# Lets the page render in our colors before any custom CSS loads,
# so there's no flash of default Streamlit purple on first paint.

[theme]
base = "light"
primaryColor = "#2ECC71"
backgroundColor = "#FAFAFA"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1E1E1E"
font = "sans serif"

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
